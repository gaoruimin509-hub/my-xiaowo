<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="utf-8">

<title>小窝</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:
    "Zen Maru Gothic",
    "Microsoft YaHei",
    "幼圆",
    sans-serif;
    
    background: 
        /* 左边的大白云朵 */
        radial-gradient(circle at 15% 25%, #ffffff 0%, #ffffff 12%, transparent 13%),
        radial-gradient(circle at 22% 28%, #ffffff 0%, #ffffff 15%, transparent 16%),
        radial-gradient(circle at 28% 26%, #ffffff 0%, #ffffff 10%, transparent 11%),
        /* 右边的大白云朵 */
        radial-gradient(circle at 72% 62%, #ffffff 0%, #ffffff 11%, transparent 12%),
        radial-gradient(circle at 78% 65%, #ffffff 0%, #ffffff 16%, transparent 17%),
        radial-gradient(circle at 85% 63%, #ffffff 0%, #ffffff 12%, transparent 13%),
        /* 最底层的奶蓝柔雾粉彩虹渐变 */
        linear-gradient(135deg, #a2d2ff 0%, #ffcbd5 100%) !important;

    background-attachment: fixed !important;

    margin: 0;
    min-height: 100vh;
}

.header{

    text-align:center;

    padding-top:40px;

    padding-bottom:20px;
}

.header h1 {
    margin: 0;
    font-size: 38px;

    font-family: 'ZCOOL KuaiLe', cursive !important; 
    color: #5d75a8;
}

.header p{

    margin-top:8px;

    color:#b6c6e8;

    font-size:14px;
}

.container{

    max-width:820px;

    margin:auto;

    padding:0 18px;
}

.bubble{

    background:#ffffff;

    border:2px solid #e5f2ff;

    border-radius:32px;

    padding:22px;

    margin:18px auto;

    max-width:88%;

    text-align:left;

    box-shadow:
    0 8px 20px rgba(193,224,255,0.25);

    transition:0.3s;
}

.bubble:hover{

    transform:translateY(-2px);
}

.read{

    border:2px solid #d6e3ff;

    background:
    rgba(255,255,255,0.55);

    backdrop-filter:blur(10px);

    box-shadow:
    inset 0 0 18px rgba(255,255,255,0.7);
}

.content{

    font-size:18px;

    line-height:1.8;

    color:#6c80af;

    word-break:break-word;
}

.time{

    margin-top:14px;

    text-align:right;

    color:#b7c7e7;

    font-size:12px;
}

.read-btn{

    margin-top:12px;

    background:
    linear-gradient(
        135deg,
        #ffd9ea,
        #cdeeff
    );

    color:#6d82b3;

    border:none;

    border-radius:999px;

    padding:8px 16px;

    font-size:13px;

    cursor:pointer;

    transition:0.3s;
}

.read-btn:hover{

    transform:scale(1.05);
}

.input-area{

    position:fixed;

    bottom:20px;

    left:50%;

    transform:translateX(-50%);

    width:92%;

    max-width:760px;

    display:flex;

    gap:12px;
}

input{

    flex:1;

    background:#ffffff;

    border:2px solid #e5f2ff;

    border-radius:999px;

    padding:18px 22px;

    font-size:16px;

    color:#6d82b3;

    outline:none;

    box-shadow:
    0 4px 12px rgba(193,224,255,0.18);
}

input::placeholder{

    color:#b8c7e8;
}

.send-btn{

    background:
    linear-gradient(
        135deg,
        #ffd9ea,
        #cdeeff
    );

    color:#6d82b3;

    border:none;

    border-radius:999px;

    padding:18px 26px;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.send-btn:hover{

    transform:scale(1.03);
}

.footer-space{

    height:30px;
}

</style>

</head>

<body>

<div class="header">

    <h1>☁️ 小窝 ☁️</h1>

    <p>把想说的话轻轻放在这里</p>

</div>

<div class="container">

    <div id="messages">

        {% for msg in messages %}

        <div class="bubble {% if msg.read %}read{% endif %}">

            <div class="content">
                {{ msg.content }}
            </div>

            <div class="time">
                {{ msg.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}
            </div>

            {% if not msg.read %}
            <button
                class="read-btn"
                onclick="markRead({{ msg.id }})">
                已读
            </button>
            {% endif %}

        </div>

        {% endfor %}

    </div>

</div>

<div class="footer-space"></div>

<div class="input-area">

    <input
        type="text"
        id="content"
        maxlength="500"
        placeholder="写下今天的小心情吧...">

    <button
        class="send-btn"
        onclick="postMessage()">
        发送
    </button>

</div>

<script>

function postMessage(){

    let content =
    document
    .getElementById('content')
    .value
    .trim();

    if(!content){
        return;
    }

    fetch('/post',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            content:content
        })

    })
    .then(()=>{
        location.reload();
    });
}

function markRead(id){

    fetch('/read/' + id,{

        method:'POST'

    })
    .then(()=>{
        location.reload();
    });
}

document
.getElementById('content')
.addEventListener('keypress',function(e){

    if(e.key === 'Enter'){
        postMessage();
    }

});

</script>

</body>
</html>
